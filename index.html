<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SP Task - Delegation System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070710; --txt:#eef0f7; --muted:#9aa0b4; --accent:#7c5cff; --accent2:#46b5ff;
  --danger:#ff5d6c; --ok:#37d399; --warn:#ffb547; --info:#46b5ff;
  --card:rgba(255,255,255,.045); --brd:rgba(255,255,255,.09); --inp:rgba(255,255,255,.04);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Jost',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{background:var(--bg);color:var(--txt);min-height:100dvh}
.blob{position:fixed;border-radius:50%;filter:blur(95px);opacity:.4;z-index:0;pointer-events:none}
.b1{width:440px;height:440px;background:#6b46ff;top:-130px;left:-120px}
.b2{width:400px;height:400px;background:#1f7bff;bottom:-150px;right:-110px}
@keyframes f1{50%{transform:translate(40px,30px) scale(1.1)}}

/* ============ AUTH (centered) ============ */
.authwrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;z-index:2}
.shell{width:min(960px,100%);display:flex;background:rgba(13,13,24,.55);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);border:1px solid var(--brd);border-radius:24px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.brand{flex:1;padding:44px 38px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(160deg,rgba(124,92,255,.22),rgba(70,181,255,.10));border-right:1px solid var(--brd)}
.logo{display:flex;align-items:center;gap:12px}
.logo .dot{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;box-shadow:0 8px 22px rgba(124,92,255,.5)}
.logo h1{font-size:18px;font-weight:600}
.brand .tag{font-size:12.5px;color:var(--muted);margin-top:2px}
.hero{margin:28px 0}
.hero h2{font-size:29px;line-height:1.25;font-weight:600}
.hero h2 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--muted);font-size:14px;margin-top:11px;max-width:330px;line-height:1.6}
.feat{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.feat .row{display:flex;align-items:center;gap:11px;font-size:13.5px;color:#cfd3e3}
.feat .ic{width:30px;height:30px;border-radius:9px;background:var(--inp);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.credit{font-size:11.5px;color:var(--muted)}
.panel{flex:1;padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.panel h3{font-size:23px;font-weight:600}
.panel .sub{color:var(--muted);font-size:13.5px;margin-top:6px;margin-bottom:20px;line-height:1.55}

.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border-radius:12px;background:var(--inp);border:1px solid var(--brd);color:var(--txt);font-size:16px;outline:none;transition:.2s;font-family:'Jost'}
.field textarea{resize:vertical;min-height:78px}
.field input::placeholder,.field textarea::placeholder{color:#5d6379}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.18);background:rgba(255,255,255,.06)}
.field select option{background:#13131c}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;font-family:'Jost';font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:.2s;box-shadow:0 12px 30px rgba(124,92,255,.4)}
.btn:hover{transform:translateY(-2px);box-shadow:0 16px 38px rgba(124,92,255,.5)}
.btn:active{transform:translateY(0)} .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;border:1px solid var(--brd);box-shadow:none;color:var(--txt)}
.btn.ghost:hover{background:var(--inp);box-shadow:none;transform:none}
.btn.sm{width:auto;padding:8px 14px;font-size:13px;border-radius:9px;box-shadow:none}
.msg{margin-top:14px;padding:11px 14px;border-radius:11px;font-size:13.5px;display:none;line-height:1.4}
.msg.err{display:block;background:rgba(255,93,108,.12);border:1px solid rgba(255,93,108,.35);color:#ff97a2}
.msg.ok{display:block;background:rgba(55,211,153,.12);border:1px solid rgba(55,211,153,.35);color:#7fe9c0}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ============ APP ============ */
.app{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--brd);background:rgba(13,13,24,.55);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10}
.userchip{display:flex;align-items:center;gap:10px}
.userchip .av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.userchip .nm{font-size:14px;font-weight:500;line-height:1.1}
.userchip .rl{font-size:11px;color:var(--muted)}
.nav{display:flex;gap:8px;padding:12px 18px;overflow-x:auto;border-bottom:1px solid var(--brd);background:rgba(10,10,18,.4)}
.nav::-webkit-scrollbar{display:none}
.nav button{flex-shrink:0;padding:9px 16px;border-radius:30px;border:1px solid var(--brd);background:var(--inp);color:var(--muted);font-family:'Jost';font-size:13.5px;font-weight:500;cursor:pointer;transition:.2s;white-space:nowrap}
.nav button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(124,92,255,.35)}
.content{flex:1;padding:22px 22px 60px;max-width:1100px;width:100%;margin:0 auto}
.h{font-size:21px;font-weight:600;margin-bottom:4px}
.hs{font-size:13px;color:var(--muted);margin-bottom:20px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px}
.stat{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:18px}
.stat .n{font-size:30px;font-weight:700}
.stat .l{font-size:12.5px;color:var(--muted);margin-top:3px}
.stat .bar{height:3px;border-radius:3px;margin-top:12px;background:var(--accent)}

.box{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:20px;margin-bottom:18px}
.box h4{font-size:15px;font-weight:600;margin-bottom:14px}

.tcard{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:15px 16px;margin-bottom:11px}
.tcard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.tcard .tt{font-size:15px;font-weight:600;line-height:1.3}
.tcard .ds{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}
.tcard .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:12px;color:var(--muted)}
.tcard .meta b{color:#cfd3e3;font-weight:500}
.tcard .acts{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
.bg-Pending{background:rgba(154,160,180,.18);color:#c2c7d6;border:1px solid rgba(154,160,180,.35)}
.bg-Progress{background:rgba(70,181,255,.16);color:#8fd0ff;border:1px solid rgba(70,181,255,.4)}
.bg-Done{background:rgba(55,211,153,.16);color:#7fe9c0;border:1px solid rgba(55,211,153,.4)}
.bg-Verified{background:rgba(124,92,255,.18);color:#c9bdff;border:1px solid rgba(124,92,255,.4)}
.bg-Overdue{background:rgba(255,93,108,.16);color:#ff97a2;border:1px solid rgba(255,93,108,.4)}
.pri-High{color:#ff97a2} .pri-Medium{color:#ffc875} .pri-Low{color:#8fd0ff}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.fchip{padding:7px 13px;border-radius:20px;border:1px solid var(--brd);background:var(--inp);color:var(--muted);font-size:12.5px;cursor:pointer;font-family:'Jost'}
.fchip.active{background:rgba(124,92,255,.2);border-color:rgba(124,92,255,.5);color:#c9bdff}
.frow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.frow select{padding:9px 12px;border-radius:10px;background:var(--inp);border:1px solid var(--brd);color:var(--txt);font-size:13px;font-family:'Jost';outline:none}
.frow select option{background:#13131c}

table.rep{width:100%;border-collapse:collapse;font-size:13.5px}
table.rep th{text-align:left;color:var(--muted);font-weight:500;font-size:12px;padding:10px 8px;border-bottom:1px solid var(--brd)}
table.rep td{padding:11px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
table.rep tr:last-child td{border:none}
.pct{display:inline-block;min-width:42px;text-align:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}

.emprow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.emprow:last-child{border:none}
.emprow .info{font-size:14px} .emprow .info small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 10px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#16161f;border:1px solid var(--brd);padding:13px 20px;border-radius:12px;font-size:13.5px;z-index:10001;opacity:0;transition:.3s;box-shadow:0 12px 30px rgba(0,0,0,.5);max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(55,211,153,.4)} .toast.err{border-color:rgba(255,93,108,.4)}

/* ===== Face ID style loader ===== */
.faceLoader{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(7,7,16,.55);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px)}
.faceLoader.show{display:flex;animation:flFade .2s ease}
@keyframes flFade{from{opacity:0}to{opacity:1}}
@keyframes flPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.loading-text{font-family:'Jost',sans-serif;font-size:32px;font-weight:800;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,rgba(255,255,255,.28) 0%,#fff 50%,rgba(255,255,255,.28) 100%);background-size:200% auto;color:transparent;-webkit-background-clip:text;background-clip:text;animation:shimmer 1.8s linear infinite}
@keyframes shimmer{to{background-position:200% center}}

/* ===== Modal popup ===== */
.modal{position:fixed;inset:0;z-index:9998;display:none;align-items:center;justify-content:center;background:rgba(7,7,16,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:20px}
.modal.show{display:flex;animation:flFade .2s ease}
.modal-card{width:min(380px,100%);background:rgba(20,20,32,.94);border:1px solid var(--brd);border-radius:20px;padding:26px 24px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.6);animation:flPop .28s cubic-bezier(.2,.85,.3,1.25)}
.modal-ic{font-size:34px;margin-bottom:10px}
.modal-title{font-size:18px;font-weight:600;margin-bottom:8px}
.modal-msg{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:22px}
.modal-acts{display:flex;gap:10px}
.modal-acts .btn{margin-top:0}
.btn.danger{background:linear-gradient(135deg,#ff5d6c,#ff3b6b);box-shadow:0 12px 30px rgba(255,93,108,.4)}

/* ===== charts + report ===== */
.bars{display:flex;flex-direction:column;gap:12px}
.barrow{display:grid;grid-template-columns:120px 1fr 54px;align-items:center;gap:12px;font-size:13px}
.barrow .nm{color:#cfd3e3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bartrack{height:22px;border-radius:7px;background:var(--inp);border:1px solid var(--brd);overflow:hidden;display:flex}
.barseg{height:100%;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.barval{text-align:right;font-weight:600;font-size:13px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}

.repcard{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:18px;margin-bottom:14px}
.rephead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.repname{font-size:16px;font-weight:600}
.repname small{display:block;color:var(--muted);font-size:12px;font-weight:400;margin-top:2px}
.ring{width:64px;height:64px;flex-shrink:0}
.repgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:10px;margin-bottom:12px}
.repbox{background:var(--inp);border:1px solid var(--brd);border-radius:11px;padding:9px 6px;text-align:center}
.repbox .n{font-size:18px;font-weight:700}
.repbox .l{font-size:10.5px;color:var(--muted);margin-top:2px}
.rank{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:8px;background:var(--inp);border:1px solid var(--brd);font-size:12px;font-weight:600;margin-right:8px}
.rank.g1{background:rgba(255,199,117,.2);border-color:rgba(255,199,117,.5);color:#ffc875}
.rank.g2{background:rgba(200,206,222,.16);border-color:rgba(200,206,222,.4);color:#c8cede}
.rank.g3{background:rgba(205,127,80,.18);border-color:rgba(205,127,80,.45);color:#e0a075}

/* ===== autocomplete ===== */
.ac{position:relative}
.aclist{position:absolute;top:100%;left:0;right:0;z-index:20;background:#14141f;border:1px solid var(--brd);border-radius:12px;margin-top:5px;max-height:190px;overflow-y:auto;display:none;box-shadow:0 14px 34px rgba(0,0,0,.5)}
.aclist.show{display:block}
.acitem{padding:11px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)}
.acitem:last-child{border:none}
.acitem:hover,.acitem.on{background:rgba(124,92,255,.16)}
.acitem small{display:block;color:var(--muted);font-size:11.5px;margin-top:1px}
.acnew{color:#7fe9c0}

@media(max-width:760px){
  .authwrap{padding:0}
  .shell{flex-direction:column;border-radius:0;min-height:100dvh}
  .brand{padding:28px 22px 24px;border-right:none;border-bottom:1px solid var(--brd)}
  .hero{margin:16px 0 4px}.hero h2{font-size:23px}.hero p{font-size:13.5px}
  .feat{margin-top:13px;gap:10px}.credit{margin-top:14px}
  .panel{padding:26px 22px 38px;justify-content:flex-start}
  .topbar{padding:12px 16px}.content{padding:18px 16px 60px}
  .row2{grid-template-columns:1fr}
  .stat .n{font-size:26px}
}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<div id="root"></div>
<div class="toast" id="toast"></div>

<!-- Loading overlay -->
<div class="faceLoader" id="faceLoader">
  <div class="loading-text">Delegation</div>
</div>

<!-- Modal popup -->
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-ic" id="modalIc">⚠️</div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-acts" id="modalActs"></div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzoAsKD6L8Y2vrTlyiLVWy1C-wVkxPgiiu7OJQH4evdML54PrfXmRBvbcb6sR-4StFSAA/exec";
const DEVICE = (navigator.userAgent||"Unknown")+" | "+(navigator.platform||"");
const root = document.getElementById('root');
let STATE = { token:'', me:null, users:[], employees:[], tasks:[], report:[], totals:null, cc:'91', view:'dashboard',
              filters:{date:'all',status:'all',emp:'all'} };

/* ---- api (with Face ID loader on every server action) ---- */
let _busy=0;
function showLoader(){ _busy++; const l=document.getElementById('faceLoader'); if(l) l.classList.add('show'); }
function hideLoader(){ _busy=Math.max(0,_busy-1); if(_busy===0){ const l=document.getElementById('faceLoader'); if(l) l.classList.remove('show'); } }
function api(p){
  showLoader();
  return fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)})
    .then(r=>r.json()).then(d=>{hideLoader();return d;}).catch(e=>{hideLoader();throw e;});
}
/* ---- modern popup (replaces alert/confirm) ---- */
function modalConfirm(o){
  document.getElementById('modalIc').textContent=o.icon||'⚠️';
  document.getElementById('modalTitle').textContent=o.title||'Are you sure?';
  document.getElementById('modalMsg').textContent=o.message||'';
  const acts=document.getElementById('modalActs'); acts.innerHTML='';
  const cancel=document.createElement('button'); cancel.className='btn ghost'; cancel.textContent=o.cancelText||'Cancel'; cancel.onclick=closeModal;
  const ok=document.createElement('button'); ok.className='btn'+(o.danger?' danger':''); ok.textContent=o.confirmText||'Confirm';
  ok.onclick=function(){ closeModal(); if(o.onConfirm) o.onConfirm(); };
  if(o.onConfirm){ acts.appendChild(cancel); acts.appendChild(ok); } else { acts.appendChild(ok); }
  document.getElementById('modal').classList.add('show');
}
function modalAlert(message,title,icon){ modalConfirm({title:title||'Notice',message:message,icon:icon||'ℹ️',confirmText:'OK'}); }
function modalPrompt(o){
  document.getElementById('modalIc').textContent=o.icon||'✏️';
  document.getElementById('modalTitle').textContent=o.title||'Enter value';
  const msg=document.getElementById('modalMsg');
  msg.innerHTML=(o.message?'<div style="margin-bottom:12px">'+esc(o.message)+'</div>':'')+
    '<input id="modalInput" type="'+(o.password?'password':'text')+'" placeholder="'+esc(o.placeholder||'')+'" style="width:100%;padding:12px 14px;border-radius:12px;background:var(--inp);border:1px solid var(--brd);color:var(--txt);font-size:16px;outline:none;font-family:Jost">';
  const acts=document.getElementById('modalActs'); acts.innerHTML='';
  const cancel=document.createElement('button'); cancel.className='btn ghost'; cancel.textContent='Cancel'; cancel.onclick=closeModal;
  const ok=document.createElement('button'); ok.className='btn'; ok.textContent=o.confirmText||'Save';
  ok.onclick=function(){ const val=(document.getElementById('modalInput').value||'').trim(); closeModal(); if(o.onConfirm) o.onConfirm(val); };
  acts.appendChild(cancel); acts.appendChild(ok);
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>{const i=document.getElementById('modalInput'); if(i){i.focus(); i.addEventListener('keydown',e=>{if(e.key==='Enter')ok.click();});}},60);
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function tGet(){try{return localStorage.getItem('sp_token')||''}catch(e){return ''}}
function tSet(t){try{localStorage.setItem('sp_token',t)}catch(e){}}
function tClr(){try{localStorage.removeItem('sp_token')}catch(e){}}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.className='toast '+(type||''),3200);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function isDone(t){return t.status==='Done'||t.status==='Verified';}
function isOverdue(t){return t.dueDate && t.dueDate<todayStr() && !isDone(t);}
function initials(n){return (n||'?').trim().split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase();}

/* ===================== BOOT ===================== */
(async function(){
  const t=tGet();
  if(t){ STATE.token=t;
    try{ const r=await api({action:'checkSession',token:t}); if(r.ok) return loadApp(); }catch(e){}
    tClr(); STATE.token='';
  }
  try{ const s=await api({action:'signupStatus'}); (s.ok&&s.open)?renderSignup():renderLogin(); }
  catch(e){ renderLogin(); }
})();

/* ===================== AUTH SHELL ===================== */
function authShell(inner){
  return `<div class="authwrap"><div class="shell">
    <div class="brand">

        done=t.filter(isDone).length, over=t.filter(isOverdue).length;

  return `<div class="h">Dashboard</div><div class="hs">Overview of all delegated tasks.</div>
    <div class="cards">

      ${stat(pend,'Pending','#9aa0b4')}

/* ---- TASKS + FILTERS ---- */
function viewTasks(){
  const f=STATE.filters;
  const names=[...new Set(STATE.tasks.map(t=>t.assigneeName).filter(Boolean))].sort();
  const empOpts=names.map(n=>`<option value="${esc(n)}" ${f.emp===n?'selected':''}>${esc(n)}</option>`).join('');
  const dateChips=[['all','All'],['today','Today'],['tomorrow','Tomorrow'],['future','Future'],['previous','Previous']]
    .map(d=>`<div class="fchip ${f.date===d[0]?'active':''}" onclick="setF('date','${d[0]}')">${d[1]}</div>`).join('');
  const filtered=applyFilters();
  return `<div class="h">Tasks</div><div class="hs">Filter, track and update every delegated task.</div>
    <div class="filters">${dateChips}</div>
    <div class="frow">
      <select onchange="setF('status',this.value)">
        ${['all','Pending','In Progress','Done','Verified','Overdue'].map(x=>`<option value="${x}" ${f.status===x?'selected':''}>${x==='all'?'All status':x}</option>`).join('')}
      </select>
      <select onchange="setF('emp',this.value)">
        <option value="all" ${f.emp==='all'?'selected':''}>All people</option>${empOpts}
      </select>
    </div>
    ${filtered.length?filtered.map(taskCard).join(''):'<div class="empty">No tasks match these filters.</div>'}`;
}
function setF(k,val){STATE.filters[k]=val;renderView();}
function applyFilters(){
  const f=STATE.filters,today=todayStr(),tmr=addDays(today,1);
  return STATE.tasks.slice().reverse().filter(t=>{
    if(f.emp!=='all' && t.assigneeName!==f.emp) return false;
    if(f.status==='Overdue'){ if(!isOverdue(t)) return false; }
    else if(f.status!=='all' && t.status!==f.status) return false;
    if(f.date==='today'){ if(t.dueDate!==today) return false; }
    else if(f.date==='tomorrow'){ if(t.dueDate!==tmr) return false; }
    else if(f.date==='future'){ if(!(t.dueDate && t.dueDate>tmr)) return false; }
    else if(f.date==='previous'){ if(!(t.dueDate && t.dueDate<today)) return false; }
    return true;
  });
}
function taskCard(t){
  const emp=t.assignedTo?STATE.users.find(u=>u.empId===t.assignedTo):null;
  const nm=t.assigneeName||(emp?emp.name:'—');
  const phone=emp?emp.phone:'';
  const email=emp?emp.email:'';
  const stt=isOverdue(t)?'Overdue':t.status;
  const cls={'Pending':'bg-Pending','In Progress':'bg-Progress','Done':'bg-Done','Verified':'bg-Verified','Overdue':'bg-Overdue'}[stt]||'bg-Pending';
  const waText=`Hello ${nm}, regarding your task: "${t.title}"`+(t.dueDate?` (due ${t.dueDate})`:'')+`. Please share an update. — ${STATE.me.name}`;
  return `<div class="tcard">
    <div class="top">
      <div><div class="tt">${esc(t.title)}</div>${t.description?`<div class="ds">${esc(t.description)}</div>`:''}</div>
      <span class="badge ${cls}">${stt}</span>
    </div>
    <div class="meta">
      <span>👤 <b>${esc(nm)}</b>${!t.assignedTo?' <span style="color:#5d6379">(free entry)</span>':''}</span>
      <span>🚩 <b class="pri-${esc(t.priority)}">${esc(t.priority||'—')}</b></span>
      <span>📅 Due <b>${esc(t.dueDate||'—')}</b></span>
      <span>🆔 ${esc(t.taskId)}</span>
    </div>
    ${t.remarks?`<div class="ds" style="margin-top:9px;padding:9px 12px;background:var(--inp);border-radius:9px;border-left:2px solid var(--accent)">📝 ${esc(t.remarks)}</div>`:''}
    <div class="acts">
      ${!isDone(t)?`<button class="btn ghost sm" onclick="askUpdate('${t.taskId}')">📞 Call Update</button>`:''}
      ${!isDone(t)?`<button class="btn ghost sm" onclick="askDone('${t.taskId}')">✓ Mark Done</button>`:''}
      ${t.status==='Done'?`<button class="btn ghost sm" onclick="setStatus('${t.taskId}','Verified')">Verify</button>`:''}
      ${phone?`<a class="btn ghost sm" style="text-decoration:none" target="_blank" href="${waLink(phone,waText)}">💬 WhatsApp</a>`:''}
      ${email&&!isDone(t)?`<button class="btn ghost sm" onclick="followup('${t.taskId}')">📧 Email</button>`:''}
      <button class="btn ghost sm" onclick="delTask('${t.taskId}')" style="color:#ff97a2">Delete</button>
    </div></div>`;
}
async function setStatus(id,st,remarks){
  const r=await api({action:'updateTaskStatus',token:STATE.token,taskId:id,status:st,remarks:remarks||''});
  r.ok?(toast(r.message,'ok'),refresh()):toast(r.error||'Failed.','err');
}
function askUpdate(id){
  modalPrompt({title:'Call Update',message:'Record what they said on the call.',icon:'📞',
    placeholder:'e.g. 60% done, will finish tomorrow',confirmText:'Save Update',
    onConfirm:function(val){ if(!val) return toast('Please enter an update.','err'); setStatus(id,'In Progress',val); }});
}
function askDone(id){
  modalPrompt({title:'Mark as Done',message:'Add a closing remark (optional).',icon:'✅',
    placeholder:'e.g. Confirmed complete over call',confirmText:'Mark Done',
    onConfirm:function(val){ setStatus(id,'Done',val); }});
}
async function followup(id){
  const r=await api({action:'followupTask',token:STATE.token,taskId:id});
  toast(r.ok?r.message:(r.error||'Email failed.'),r.ok?'ok':'err');
}
function delTask(id){
  modalConfirm({title:'Delete Task',message:'This task will be permanently deleted. This action cannot be undone.',
    icon:'🗑️',confirmText:'Delete',danger:true,onConfirm:async function(){
      const r=await api({action:'deleteTask',token:STATE.token,taskId:id});
      r.ok?(toast('Task deleted.','ok'),refresh()):toast(r.error||'Failed.','err');
    }});
}

/* ---- REPORTS (graphs + per-employee) ---- */
function viewReports(){
  const rep=STATE.report||[];
  if(!rep.length) return `<div class="h">Reports</div><div class="hs">Per-person performance, charts and scoring.</div>
    <div class="box"><div class="empty">No data yet. Assign some tasks to see reports.</div></div>`;
  const t=STATE.totals||{tasks:0,completed:0,overdue:0,people:rep.length};
  const maxT=Math.max.apply(null,rep.map(r=>r.total).concat([1]));

  /* stacked workload bars */
  const bars=rep.map(r=>{
    const w=x=>((x/maxT)*100).toFixed(1)+'%';
    return `<div class="barrow">
      <div class="nm" title="${esc(r.name)}">${esc(r.name)}</div>
      <div class="bartrack">
        <div class="barseg" style="width:${w(r.verified)};background:#7c5cff"></div>
        <div class="barseg" style="width:${w(r.done)};background:#37d399"></div>
        <div class="barseg" style="width:${w(r.progress)};background:#46b5ff"></div>
        <div class="barseg" style="width:${w(r.pending)};background:#6b7185"></div>
      </div>
      <div class="barval">${r.total}</div>
    </div>`;
  }).join('');

  /* score leaderboard bars */
  const scores=rep.map((r,i)=>{
    const c=r.score>=75?'#37d399':r.score>=45?'#ffb547':'#ff5d6c';
    return `<div class="barrow">
      <div class="nm"><span class="rank ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i+1}</span>${esc(r.name)}</div>
      <div class="bartrack"><div class="barseg" style="width:${r.score}%;background:${c}"></div></div>
      <div class="barval" style="color:${c}">${r.score}</div>
    </div>`;
  }).join('');

  const cards=rep.map(r=>{
    const c=r.completionRate>=75?'#37d399':r.completionRate>=45?'#ffb547':'#ff5d6c';
    return `<div class="repcard">
      <div class="rephead">
        <div class="repname">${esc(r.name)}
          <small>${r.saved?esc(r.department||'Saved employee'):'Free entry'} · Score ${r.score}/100</small></div>
        ${ring(r.completionRate,c)}
      </div>
      <div class="repgrid">
        ${rb(r.total,'Total')}${rb(r.completed,'Done','#37d399')}${rb(r.pending+r.progress,'Open')}
        ${rb(r.overdue,'Overdue',r.overdue?'#ff5d6c':'')}${rb(r.onTimeRate+'%','On-time')}${rb(r.avgDays||'—','Avg Days')}
      </div>
      <div class="barrow" style="grid-template-columns:66px 1fr 40px;font-size:12px">
        <div class="nm">Priority</div>
        <div class="bartrack" style="height:14px">
          <div class="barseg" style="width:${pc(r.high,r.total)}%;background:#ff5d6c"></div>
          <div class="barseg" style="width:${pc(r.medium,r.total)}%;background:#ffb547"></div>
          <div class="barseg" style="width:${pc(r.low,r.total)}%;background:#46b5ff"></div>
        </div>
        <div class="barval" style="font-size:11px;color:var(--muted)">H${r.high}·M${r.medium}·L${r.low}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="h">Reports</div><div class="hs">Per-person performance, charts and scoring — use this for incentives.</div>
    <div class="cards">
      ${stat(t.tasks,'Total Tasks','var(--accent)')}
      ${stat(t.completed,'Completed','var(--ok)')}
      ${stat(t.overdue,'Overdue','var(--danger)')}
      ${stat(t.people,'People','var(--info)')}
    </div>
    <div class="box"><h4>Performance Score (incentive ranking)</h4>
      <div class="bars">${scores}</div>
      <div class="legend"><span>Score = 60% completion + 40% punctuality − 5 per overdue task</span></div>
    </div>
    <div class="box"><h4>Workload by Person</h4>
      <div class="bars">${bars}</div>
      <div class="legend">
        <span><i style="background:#7c5cff"></i>Verified</span>
        <span><i style="background:#37d399"></i>Done</span>
        <span><i style="background:#46b5ff"></i>In Progress</span>
        <span><i style="background:#6b7185"></i>Pending</span>
      </div>
    </div>
    <div class="h" style="font-size:17px;margin:24px 0 4px">Individual Reports</div>
    <div class="hs">Completion ring, task mix and punctuality for each person.</div>
    ${cards}
    <button class="btn ghost" style="margin-top:6px" onclick="exportReport()">⬇ Download CSV</button>`;
}
function rb(n,l,col){ return `<div class="repbox"><div class="n" ${col?`style="color:${col}"`:''}>${n}</div><div class="l">${l}</div></div>`; }
function pc(a,b){ return b?((a/b)*100).toFixed(1):0; }
function ring(pct,col){
  const R=26,C=2*Math.PI*R,off=C-(pct/100)*C;
  return `<svg class="ring" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="${R}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"/>
    <circle cx="32" cy="32" r="${R}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 32 32)"/>
    <text x="32" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#eef0f7" font-family="Jost">${pct}%</text>
  </svg>`;
}
function exportReport(){
  const rows=[['Name','Department','Total','Completed','Pending','In Progress','Overdue','Completion %','On-time %','Avg Days','Score']];
  (STATE.report||[]).forEach(r=>rows.push([r.name,r.department||'',r.total,r.completed,r.pending,r.progress,r.overdue,r.completionRate,r.onTimeRate,r.avgDays,r.score]));
  const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='delegation-report-'+todayStr()+'.csv'; a.click();
  toast('Report downloaded.','ok');
}

/* ---- common ---- */
async function doLogout(){ try{await api({action:'logout',token:STATE.token});}catch(e){} tClr(); STATE.token=''; location.reload(); }
function v(id){return (document.getElementById(id).value||'').trim();}
function showMsg(el,type,txt){el.className='msg '+type;el.textContent=txt||'Something went wrong.';}
function reset(b,txt){b.disabled=false;b.textContent=txt;}
</script>
</body>
